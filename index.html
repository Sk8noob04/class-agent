<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Class Agent</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0a0f; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100dvh; display: flex; flex-direction: column; }
    header { padding: 16px 20px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1e1e2e; }
    .logo { font-size: 18px; font-weight: 700; color: #c084fc; letter-spacing: 0.5px; }
    .logo span { color: #38bdf8; }
    .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #334155; transition: background 0.3s; }
    .status-dot.listening { background: #22c55e; box-shadow: 0 0 8px #22c55e; animation: pulse 1.5s infinite; }
    .status-dot.processing { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .setup-panel { padding: 24px 20px; display: flex; flex-direction: column; gap: 14px; }
    .setup-panel h2 { font-size: 15px; color: #94a3b8; font-weight: 500; }
    input[type="password"], input[type="text"] { width: 100%; background: #141420; border: 1px solid #2d2d44; border-radius: 10px; padding: 12px 14px; color: #e0e0e0; font-size: 14px; outline: none; transition: border-color 0.2s; }
    input:focus { border-color: #7c3aed; }
    .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #7c3aed; color: white; }
    .btn-primary:active { background: #6d28d9; transform: scale(0.98); }
    .btn-stop { background: #ef4444; color: white; }
    .main-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .controls { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; }
    .mic-status { display: flex; align-items: center; gap: 10px; font-size: 14px; color: #64748b; }
    .mic-status.active { color: #22c55e; }
    .transcript-box { margin: 0 20px; background: #0f0f1a; border: 1px solid #1e1e2e; border-radius: 12px; padding: 14px; font-size: 13px; line-height: 1.6; color: #94a3b8; overflow-y: auto; max-height: 200px; min-height: 80px; }
    .transcript-box .live { color: #c084fc; font-style: italic; }
    .tasks-section { padding: 16px 20px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; flex: 1; }
    .tasks-section h3 { font-size: 13px; color: #475569; text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; }
    .task-card { background: #0f0f1a; border: 1px solid #2d2d44; border-radius: 12px; padding: 14px; animation: slideIn 0.3s ease; }
    .task-card.alert { border-color: #f59e0b; }
    .task-card.done { border-color: #22c55e; }
    @keyframes slideIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .task-card .tag { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 6px; color: #f59e0b; }
    .task-card.done .tag { color: #22c55e; }
    .task-card .body { font-size: 13px; color: #94a3b8; line-height: 1.6; white-space: pre-wrap; }
    .task-card .actions { display: flex; gap: 8px; margin-top: 10px; }
    .btn-sm { flex: 1; padding: 8px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-sm.confirm { background: #16a34a; color: white; }
    .btn-sm.dismiss { background: #1e1e2e; color: #94a3b8; }
    .empty-state { text-align: center; color: #334155; font-size: 14px; padding: 30px 0; }
    .hidden { display: none !important; }
    .settings-link { text-align: center; padding: 12px; font-size: 12px; color: #334155; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>
<header>
  <div class="logo">Class<span>Agent</span></div>
  <div class="status-dot" id="statusDot"></div>
</header>
<div class="setup-panel" id="setupPanel">
  <h2>Ingresa tu API Key de Anthropic</h2>
  <input type="password" id="apiKeyInput" placeholder="sk-ant-api03-..." autocomplete="off" />
  <input type="text" id="keywordsInput" value="tarea, entregar, trabajo, presentacion, investigacion, informe, para el lunes, para manana, fecha limite" />
  <button class="btn btn-primary" onclick="saveSetup()">Guardar y comenzar</button>
</div>
<div class="main-panel hidden" id="mainPanel">
  <div class="controls">
    <div class="mic-status" id="micStatus">Microfono en pausa</div>
    <button class="btn btn-primary" id="listenBtn" onclick="toggleListening()">Empezar a escuchar</button>
  </div>
  <div class="transcript-box" id="transcriptBox"><span style="color:#334155">La transcripcion aparecera aqui...</span></div>
  <div class="tasks-section">
    <h3>Tareas detectadas</h3>
    <div id="tasksList"><div class="empty-state">Aun no se detecto ninguna tarea</div></div>
  </div>
  <div class="settings-link" onclick="showSetup()">Cambiar API key</div>
</div>
<script>
const STORAGE_KEY='classagent_config';
let recognition=null,isListening=false,fullTranscript='',pendingTranscript='',taskCards=[],apiKey='',keywords=[],debounceTimer=null,contextBuffer=[];
function init(){const s=localStorage.getItem(STORAGE_KEY);if(s){const c=JSON.parse(s);apiKey=c.apiKey;keywords=c.keywords;document.getElementById('apiKeyInput').value=apiKey;document.getElementById('keywordsInput').value=keywords.join(', ');showMain();}}
function saveSetup(){apiKey=document.getElementById('apiKeyInput').value.trim();const r=document.getElementById('keywordsInput').value;keywords=r.split(',').map(k=>k.trim().toLowerCase()).filter(Boolean);if(!apiKey){alert('Ingresa tu API key');return;}localStorage.setItem(STORAGE_KEY,JSON.stringify({apiKey,keywords}));showMain();}
function showMain(){document.getElementById('setupPanel').classList.add('hidden');document.getElementById('mainPanel').classList.remove('hidden');}
function showSetup(){stopListening();document.getElementById('mainPanel').classList.add('hidden');document.getElementById('setupPanel').classList.remove('hidden');}
function toggleListening(){if(isListening)stopListening();else startListening();}
function startListening(){if(!('webkitSpeechRecognition'in window)&&!('SpeechRecognition'in window)){alert('Usa Safari en iPhone');return;}const SR=window.SpeechRecognition||window.webkitSpeechRecognition;recognition=new SR();recognition.continuous=true;recognition.interimResults=true;recognition.lang='es-ES';recognition.maxAlternatives=1;recognition.onstart=()=>{isListening=true;document.getElementById('listenBtn').textContent='Detener';document.getElementById('listenBtn').className='btn btn-stop';document.getElementById('micStatus').textContent='Escuchando...';document.getElementById('micStatus').className='mic-status active';document.getElementById('statusDot').className='status-dot listening';document.getElementById('transcriptBox').innerHTML='';};recognition.onresult=(e)=>{let interim='',final='';for(let i=e.resultIndex;i<e.results.length;i++){const t=e.results[i][0].transcript;if(e.results[i].isFinal){final+=t+' ';}else{interim+=t;}}if(final){fullTranscript+=final;pendingTranscript+=final;contextBuffer.push(final.trim());if(contextBuffer.length>15)contextBuffer.shift();checkForKeywords(pendingTranscript);}const display=fullTranscript.slice(-300);document.getElementById('transcriptBox').innerHTML='<span>'+display+'</span><span class="live"> '+interim+'</span>';document.getElementById('transcriptBox').scrollTop=9999;};recognition.onerror=(e)=>{if(e.error==='no-speech')return;};recognition.onend=()=>{if(isListening){setTimeout(()=>{try{recognition.start();}catch(err){}},300);}};recognition.start();}
function stopListening(){isListening=false;if(recognition){try{recognition.stop();}catch(e){}recognition=null;}document.getElementById('listenBtn').textContent='Empezar a escuchar';document.getElementById('listenBtn').className='btn btn-primary';document.getElementById('micStatus').textContent='Microfono en pausa';document.getElementById('micStatus').className='mic-status';document.getElementById('statusDot').className='status-dot';}
function checkForKeywords(text){const lower=text.toLowerCase();const hit=keywords.some(kw=>lower.includes(kw));if(!hit)return;clearTimeout(debounceTimer);debounceTimer=setTimeout(()=>{const context=contextBuffer.join(' ');pendingTranscript='';callClaude(context);},8000);}
async function callClaude(context){document.getElementById('statusDot').className='status-dot processing';const prompt='Analiza este fragmento de clase universitaria.

Si el profesor asigna una tarea/trabajo/presentacion responde:
TAREA_DETECTADA
Que se pide: ...
Formato: ...
Fecha: ...
Requisitos: ...

Si NO hay tarea responde solo: NO_TAREA

Fragmento:
"'+context+'"';try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:400,messages:[{role:'user',content:prompt}]})});const data=await res.json();const reply=data.content?.[0]?.text||'';if(reply.includes('TAREA_DETECTADA')){addTaskCard(reply.replace('TAREA_DETECTADA','').trim());if(navigator.vibrate)navigator.vibrate([200,100,200]);}}catch(err){console.error(err);}finally{if(isListening)document.getElementById('statusDot').className='status-dot listening';}}
function addTaskCard(content){const id=Date.now();taskCards.push({id,content,dismissed:false});renderTasks();window.scrollTo(0,document.body.scrollHeight);}
function renderTasks(){const list=document.getElementById('tasksList');if(taskCards.length===0){list.innerHTML='<div class="empty-state">Aun no se detecto ninguna tarea</div>';return;}list.innerHTML=taskCards.map(t=>'<div class="task-card '+(t.dismissed?'done':'alert')+'" id="card-'+t.id+'"><div class="tag">'+(t.dismissed?'Confirmada':'Tarea detectada')+'</div><div class="body">'+t.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/
/g,'<br>')+'</div>'+(t.dismissed?'':'<div class="actions"><button class="btn-sm confirm" onclick="confirmTask('+t.id+')">Confirmar</button><button class="btn-sm dismiss" onclick="dismissTask('+t.id+')">Ignorar</button></div>')+'</div>').join('');}
function confirmTask(id){const t=taskCards.find(c=>c.id===id);if(t)t.dismissed=true;renderTasks();}
function dismissTask(id){taskCards=taskCards.filter(c=>c.id!==id);renderTasks();}
init();
</script>
</body>
</html>
